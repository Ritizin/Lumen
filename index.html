/* ============================================================
   AUTH GATE (tela de login / cadastro)
   ============================================================ */
function renderAuthGate(){
  const shell = document.createElement("div");
  shell.className = "auth-shell";

  const card = document.createElement("div");
  card.className = "auth-card";

  const isLogin = state.authMode === "login";

  card.innerHTML = `
    <div class="brand" style="justify-content:center;">
      <svg class="logo-mark" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <rect width="32" height="32" rx="8" fill="#0a0a0f"/>
        <circle cx="16" cy="16" r="5" fill="#e3a458"/>
        <g stroke="#e3a458" stroke-width="2" stroke-linecap="round">
          <line x1="16" y1="4" x2="16" y2="8"/><line x1="16" y1="24" x2="16" y2="28"/>
          <line x1="4" y1="16" x2="8" y2="16"/><line x1="24" y1="16" x2="28" y2="16"/>
          <line x1="7.5" y1="7.5" x2="10.3" y2="10.3"/><line x1="21.7" y1="21.7" x2="24.5" y2="24.5"/>
          <line x1="24.5" y1="7.5" x2="21.7" y2="10.3"/><line x1="10.3" y1="21.7" x2="7.5" y2="24.5"/>
        </g>
      </svg>
      <div>Lumen</div>
    </div>
    <div class="auth-sub">${isLogin ? "Entre para ver a galeria completa." : "Crie sua conta para começar."}</div>
    <div id="authAlert"></div>
    <form id="authForm">
      ${!isLogin ? `
      <div class="field">
        <label for="username">Nome de usuário</label>
        <input type="text" id="username" autocomplete="username" placeholder="seu_usuario" required>
        <div class="field-hint">3–20 caracteres, letras, números e underscore.</div>
      </div>` : ""}
      <div class="field">
        <label for="email">E-mail</label>
        <input type="email" id="email" autocomplete="email" placeholder="voce@email.com" required>
      </div>
      <div class="field">
        <label for="password">Senha</label>
        <input type="password" id="password" autocomplete="${isLogin ? "current-password" : "new-password"}" placeholder="••••••••" required minlength="6">
        ${!isLogin ? `
        <div class="strength-meter">
          <div class="strength-bar" id="bar1"></div>
          <div class="strength-bar" id="bar2"></div>
          <div class="strength-bar" id="bar3"></div>
        </div>
        <div class="field-hint" id="strengthLabel">Mínimo de 8 caracteres, misture letras, números e símbolos.</div>` : ""}
      </div>
      <button type="submit" class="btn btn-primary auth-submit" id="authSubmit">${isLogin ? "Entrar" : "Criar conta"}</button>
    </form>
    <div class="auth-switch">
      ${isLogin ? "Ainda não tem conta?" : "Já tem conta?"}
      <button id="switchMode">${isLogin ? "Cadastre-se" : "Entrar"}</button>
    </div>
  `;

  shell.appendChild(card);

  card.querySelector("#switchMode").onclick = () => {
    state.authMode = isLogin ? "signup" : "login";
    render();
  };

  if (!isLogin){
    const pwInput = card.querySelector("#password");
    pwInput.oninput = () => {
      const s = passwordStrength(pwInput.value);
      const bars = [card.querySelector("#bar1"), card.querySelector("#bar2"), card.querySelector("#bar3")];
      bars.forEach(b => b.className = "strength-bar");
      const label = card.querySelector("#strengthLabel");
      if (pwInput.value.length === 0){ label.textContent = "Mínimo de 8 caracteres, misture letras, números e símbolos."; return; }
      if (s === "weak"){ bars[0].classList.add("on-weak"); label.textContent = "Senha fraca."; }
      if (s === "mid"){ bars[0].classList.add("on-mid"); bars[1].classList.add("on-mid"); label.textContent = "Senha razoável."; }
      if (s === "strong"){ bars.forEach(b => b.classList.add("on-strong")); label.textContent = "Senha forte."; }
    };
  }

  card.querySelector("#authForm").onsubmit = async (e) => {
    e.preventDefault();
    const alertBox = card.querySelector("#authAlert");
    const submitBtn = card.querySelector("#authSubmit");
    alertBox.innerHTML = "";
    submitBtn.disabled = true;
    submitBtn.textContent = "Aguarde…";

    const email = card.querySelector("#email").value.trim();
    const password = card.querySelector("#password").value;

    let result;
    if (isLogin){
      result = await signIn(email, password);
    } else {
      const username = card.querySelector("#username").value.trim();
      result = await signUp(email, password, username);
    }

    if (result.error){
      alertBox.innerHTML = `<div class="alert alert-error">${escapeHTML(result.error)}</div>`;
      submitBtn.disabled = false;
      submitBtn.textContent = isLogin ? "Entrar" : "Criar conta";
      return;
    }

    if (!isLogin){
      // Se a confirmação por e-mail estiver ativa no projeto, não haverá sessão ainda
      if (!result.data.session){
        alertBox.innerHTML = `<div class="alert alert-ok">Conta criada! Verifique seu e-mail para confirmar antes de entrar.</div>`;
        submitBtn.disabled = false;
        submitBtn.textContent = "Criar conta";
        return;
      }
    }
    // onAuthStateChange cuida do resto
  };

  return shell;
}

/* ============================================================
   REFRESH / BOOTSTRAP
   ============================================================ */
async function refreshCurrentView(){
  if (!state.session) return;
  if (state.view === "feed"){
    state.wallpapers = await fetchPublicWallpapers();
  } else if (state.view === "boards"){
    state.boards = await fetchBoards(state.session.user.id);
  } else if (state.view === "board-detail" && state.activeBoard){
    state.boardItems = await fetchBoardItems(state.activeBoard.id);
    state.boards = await fetchBoards(state.session.user.id);
  } else if (state.view === "profile" && state.profileView){
    const userId = state.profileView.profile.id;
    const [profile, posts, publicBoards] = await Promise.all([fetchProfileById(userId), fetchUserPosts(userId), fetchPublicBoardsForProfile(userId)]);
    if (profile) state.profileView = { profile, posts, publicBoards };
  }
  renderMainOnly();
}

function withTimeout(promise, ms, label){
  let timer;
  const timeout = new Promise((_, reject) => {
    timer = setTimeout(() => reject(new Error(`Tempo esgotado ao ${label} (sem resposta do servidor).`)), ms);
  });
  return Promise.race([promise, timeout]).finally(() => clearTimeout(timer));
}

async function bootstrap(){
  try {
    console.log("[DIAG] bootstrap iniciado, chamando getSession()...");
    let session = null;
    try {
      const result = await withTimeout(sb.auth.getSession(), 8000, "verificar sessão");
      console.log("[DIAG] getSession() retornou:", result.data?.session, result.error);
      if (result.error) throw result.error;
      session = result.data.session;
    } catch (sessionErr){
      // Não deixa um getSession() travado (projeto pausado, bloqueador de
      // anúncios, rede instável, etc.) derrubar o app inteiro: segue como
      // deslogado, deixando a pessoa pelo menos ver a tela de login/feed
      // público em vez de uma tela de erro fatal.
      console.warn("[DIAG] Falha/timeout ao verificar sessão, seguindo como deslogado:", sessionErr);
      toast("Não foi possível confirmar seu login agora. Tente entrar novamente se necessário.", "error");
      session = null;
    }
    state.session = session;

    if (session){
      // Cada chamada é isolada: se uma falhar, as outras ainda completam
      // e o app renderiza com o que conseguiu carregar, em vez de travar.
      state.profile = await loadProfile(session.user.id).catch(err => {
        console.error("Erro ao carregar perfil:", err);
        return null;
      });
      state.blocked = computeBlockStatus(state.profile);
      state.categories = await fetchCategories().catch(err => {
        console.error("Erro ao carregar categorias:", err);
        return [];
      });
      if (!state.blocked){
        state.wallpapers = await fetchPublicWallpapers().catch(err => {
          console.error("Erro ao carregar wallpapers:", err);
          return [];
        });
        state.notifications = await fetchMyNotifications().catch(err => {
          console.error("Erro ao carregar notificações:", err);
          return [];
        });
      }
    }
    render();
  } catch (err){
    console.error("Erro fatal ao iniciar:", err);
    const app = document.getElementById("app");
    app.innerHTML = `
      <div class="page-loader" style="flex-direction:column; gap:14px; text-align:center; padding:20px;">
        <div style="color:var(--danger); font-size:15px; font-weight:600;">Não foi possível carregar o Lumen.</div>
        <div style="color:var(--muted); font-size:13px; max-width:420px;">${escapeHTML(err.message || String(err))}</div>
        <button class="btn btn-primary btn-sm" onclick="location.reload()">Tentar de novo</button>
      </div>
    `;
  }
}

sb.auth.onAuthStateChange(async (event, session) => {
  try {
    state.session = session;
    if (session){
      if (!state.profile || state.profile.id !== session.user.id){
        state.profile = await loadProfile(session.user.id).catch(err => {
          console.error("Erro ao carregar perfil:", err);
          return null;
        });
      }
      state.blocked = computeBlockStatus(state.profile);
      state.categories = await fetchCategories().catch(err => {
        console.error("Erro ao carregar categorias:", err);
        return [];
      });
      if (!state.blocked){
        state.view = "feed";
        state.wallpapers = await fetchPublicWallpapers().catch(err => {
          console.error("Erro ao carregar wallpapers:", err);
          return [];
        });
        state.notifications = await fetchMyNotifications().catch(err => {
          console.error("Erro ao carregar notificações:", err);
          return [];
        });
      }
    } else {
      state.profile = null;
      state.wallpapers = [];
      state.boards = [];
      state.activeBoard = null;
      state.boardItems = [];
      state.profileView = null;
      state.authMode = "login";
      state.blocked = null;
      state.notifications = [];
    }
    render();
  } catch (err){
    console.error("Erro ao processar mudança de sessão:", err);
    toast("Algo deu errado ao atualizar sua sessão. Recarregue a página.", "error");
  }
});

bootstrap();
</script>
